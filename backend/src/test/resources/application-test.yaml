app:
  environment: test

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration

  datasource:
    url: jdbc:h2:mem:silly_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    locations: classpath:db/migration

  main:
    banner-mode: "off"

management:
  health:
    redis:
      enabled: false
