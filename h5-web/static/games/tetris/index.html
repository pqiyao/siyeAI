<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
	<title>HTML5 canvas俄罗斯方块2.0</title>
	<link rel="stylesheet" type="text/css" href="css/bootstrap.min.black.css">
	<link rel="stylesheet" type="text/css" href="css/4.css">
</head>
<body>
	<div class="start-container">
		<p>
			<button class="btn btn-success btn-start" id="btn-start">开始游戏</button>
			<button class="btn btn-info btn-set">游戏设置</button>
		</p>
	</div>
	<div class="game-container">

		<!-- 时间面板 -->
		<div class="panel panel-default timer-panel">
			<div class="panel-heading">
				进行时间
			</div>
			<div class="panel-body">
				<canvas id="timer">绘制时间</canvas>
			</div>
		</div>

		<!-- 帮助面板 -->
		<div class="panel panel-default help-panel">
			<div class="panel-body">
				<p>↑ 翻转方块</p>
                <p>↓ 加速下落</p>
                <p>→ 向右移动</p>
                <p>← 向左移动</p>
			</div>
		</div>

		<!-- 级别面板 -->
		<div class="panel panel-default leval-panel">
			<div class="panel-heading">
				当前级别
			</div>
			<div class="panel-body">
				<canvas id="leval">绘制级别</canvas>
			</div>
		</div>

		<!-- 游戏主面板 -->
		<div class="game-main-panel">
			<canvas id="c_game_main">绘制游戏主体</canvas>
		</div>

		<!-- 显示下一块面板 -->
		<div class="panel panel-default next-panel ">
			<div class="panel-heading">
				下一方块
			</div>
			<div class="panel-body">
				<canvas id="nextshape">绘制下一方块</canvas>
			</div>
		</div>
		<!-- 设置面板 -->
		<div class="panel panel-default setting-panel">
			<div class="panel-body">
				<button class="btn btn-danger btn-game-pause" type="button">暂停</button>
				<button class="btn btn-warning btn-game-setting " type="button">设置</button>
				<button type="button" class="btn btn-primary btn-game-start">开始</button>
			</div>
		</div>
		<!-- 得分面板 -->
		<div class="panel panel-default score-panel">
			<div class="panel-heading">
				当前得分
			</div>
			<div class="panel-body">
				<canvas id="score">绘制得分</canvas>
			</div>
		</div>
		<!-- 最高得分面板 -->
		<div class="panel panel-default high-score-panel">
			<div class="panel-heading">
				最高得分
			</div>
			<div class="panel-body">
				<canvas id="highscore">绘制最高得分</canvas>
			</div>
		</div>
	</div>
	<!-- 弹出设置面板 -->
	<div class="tetris-mobile-hud" aria-label="game stats">
		<div class="tetris-hud-stat">
			<span>&#20998;&#25968;</span>
			<strong id="tetris-hud-score">0</strong>
		</div>
		<div class="tetris-hud-stat">
			<span>&#26368;&#39640;</span>
			<strong id="tetris-hud-best">0</strong>
		</div>
		<div class="tetris-hud-stat">
			<span>&#26102;&#38388;</span>
			<strong id="tetris-hud-time">00:00:00</strong>
		</div>
		<div class="tetris-hud-stat">
			<span>&#31561;&#32423;</span>
			<strong id="tetris-hud-level">0</strong>
		</div>
		<button class="tetris-hud-button" id="tetris-record-open" type="button">&#35760;&#24405;</button>
		<button class="tetris-hud-button" id="tetris-settings-open" type="button">&#35774;&#32622;</button>
	</div>
	<div class="tetris-dialog-panel" id="tetris-settings-panel" hidden>
		<div class="tetris-dialog-card">
			<div class="tetris-dialog-head">
				<strong>&#35774;&#32622;</strong>
				<button class="tetris-dialog-close" data-close-dialog type="button">&times;</button>
			</div>
			<label class="tetris-dialog-row">
				<span>&#22768;&#38899;</span>
				<input type="checkbox" id="tetris-sound-toggle">
			</label>
			<div class="tetris-dialog-row tetris-dialog-row--stack">
				<span>&#38590;&#24230;</span>
				<div class="tetris-difficulty-options" role="group" aria-label="difficulty">
					<button type="button" data-difficulty="easy">&#31616;&#21333;</button>
					<button type="button" data-difficulty="normal">&#26222;&#36890;</button>
					<button type="button" data-difficulty="hard">&#22256;&#38590;</button>
				</div>
			</div>
			<button class="tetris-dialog-action btn-game-pause" id="tetris-pause-toggle" type="button">&#26242;&#20572;</button>
			<button class="tetris-dialog-action" id="tetris-restart-button" type="button">&#37325;&#26032;&#24320;&#22987;</button>
		</div>
	</div>
	<div class="tetris-dialog-panel" id="tetris-record-panel" hidden>
		<div class="tetris-dialog-card">
			<div class="tetris-dialog-head">
				<strong>&#35760;&#24405;</strong>
				<button class="tetris-dialog-close" data-close-dialog type="button">&times;</button>
			</div>
			<div class="tetris-record-grid">
				<div><span>&#24403;&#21069;&#20998;&#25968;</span><strong id="tetris-record-score">0</strong></div>
				<div><span>&#26368;&#39640;&#20998;</span><strong id="tetris-record-best">0</strong></div>
				<div><span>&#28216;&#25103;&#26102;&#38388;</span><strong id="tetris-record-time">00:00:00</strong></div>
				<div><span>&#24403;&#21069;&#31561;&#32423;</span><strong id="tetris-record-level">0</strong></div>
			</div>
			<button class="tetris-dialog-action" id="tetris-clear-record" type="button">&#28165;&#31354;&#26368;&#39640;&#20998;</button>
		</div>
	</div>
	<div class="modal-dialog">
		<div class="modal-body">
			<label for="ck-sound">启用声音</label>
			<input type="checkbox" id="ck-sound">
			<br>
			<br>
			<button id="btn-dialog-close" class="btn">关闭</button>
		</div>
	</div>
	
	<script src="js/app.js"></script>
	<script src="js/Board.js"></script>
		  <!-- 主题面板绘图		 -->
	<script src="js/Canvas.js"></script>
		  <!-- 封装canvas对象 -->
    <script src="js/ResourceManager.js"></script>
	<!-- 加载资源 -->
	<script src="js/Block.js"></script>
	<!-- 单个方块 -->
	<script src="js/Shape.js"></script>
	<!-- 随机出现方块 -->
	<script src="js/Tetris.js"></script>
	<script src="js/Keyboard.js"></script>
	<script src="js/config.js"></script>
	<!-- 存储常用数据 -->
	<script src="vendor/howler.min.js"></script>
	<!-- 音频播放插件 -->
	<script src="js/Score.js"></script>
	<!-- 绘制得分 -->
	<script src="js/Timer.js"></script>
	<!-- 绘制计时 -->
	<script src="js/Leval.js"></script>
	<!-- 绘制级别 -->
	<script src="js/Nextshape.js"></script>
	<!-- 绘制下一个方块 -->
	<script src="js/highscore.js"></script>
	<!-- 绘制最高分 -->
	<script type="text/javascript">
	/*
		$('.btn-success').click(function(){
			$(".start-container").css({
				'display':'none'
			})
			$(".game-container").css({
				'display':'block'
			})
		})*/
	</script>
</body>
</html>
